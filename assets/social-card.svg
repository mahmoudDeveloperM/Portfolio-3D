<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Mahmoud Abdelrahman 3D frontend portfolio social card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff" />
      <stop offset="50%" stop-color="#dce9ff" />
      <stop offset="100%" stop-color="#d8f7f1" />
    </linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b6cff" />
      <stop offset="55%" stop-color="#10bfa6" />
      <stop offset="100%" stop-color="#ff7b1c" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="210" cy="100" r="130" fill="#ff7b1c" opacity="0.25" filter="url(#blur)" />
  <circle cx="980" cy="120" r="170" fill="#0b6cff" opacity="0.22" filter="url(#blur)" />
  <circle cx="1010" cy="540" r="190" fill="#10bfa6" opacity="0.18" filter="url(#blur)" />

  <g opacity="0.22" stroke="url(#g)" fill="none">
    <circle cx="920" cy="335" r="160" stroke-width="6" />
    <circle cx="920" cy="335" r="110" stroke-width="4" />
    <circle cx="920" cy="335" r="70" stroke-width="3" />
  </g>

  <text x="90" y="230" font-family="Space Grotesk, Manrope, sans-serif" font-size="58" font-weight="700" fill="#0e1b34">
    Mahmoud Abdelrahman
  </text>
  <text x="90" y="300" font-family="Manrope, Segoe UI, sans-serif" font-size="44" font-weight="700" fill="url(#g)">
    3D Frontend Portfolio
  </text>
  <text x="90" y="360" font-family="Manrope, Segoe UI, sans-serif" font-size="28" fill="#2f4778">
    Vue, Nuxt, SEO, and performance-first experiences
  </text>

  <rect x="90" y="415" width="530" height="72" rx="36" fill="white" opacity="0.9" />
  <text x="130" y="462" font-family="Manrope, Segoe UI, sans-serif" font-size="30" font-weight="700" fill="#0b6cff">
    mahmouddeveloperm.github.io/Portfolio-3D
  </text>
</svg>
